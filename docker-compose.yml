services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "55432:5432"
    environment:
      POSTGRES_DB: better_issues
      POSTGRES_USER: better_issues
      POSTGRES_PASSWORD: better_issues
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U better_issues -d better_issues"]
      interval: 2s
      timeout: 5s
      retries: 15

  app:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      PI_AGENT_MODEL: ${PI_AGENT_MODEL:-deepseek/deepseek-v4-flash}
      DATABASE_URL: ${DATABASE_URL:-postgres://better_issues:better_issues@postgres:5432/better_issues}
    volumes:
      - .:/workspace
      - pnpm-store:/pnpm/store
      - app-data:/workspace/packages/web/.data
    working_dir: /workspace
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "corepack enable && pnpm install && pnpm --filter @work-hub/web db:migrate && pnpm --filter @work-hub/web dev --host 0.0.0.0"
volumes:
  pnpm-store:
  app-data:
  postgres-data:
